<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Admin Scanner</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body{
      margin:0;
      padding:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    #reader{
      width:320px;
      margin:auto;
      margin-top:30px;
      border:4px solid white;
      border-radius:20px;
      overflow:hidden;
    }

    #status{
      margin-top:20px;
      font-size:22px;
      font-weight:bold;
    }

    .valid{
      color:lime;
    }

    .invalid{
      color:red;
    }

  </style>

</head>

<body>

<h1>📷 Scan Ticket</h1>

<div id="reader"></div>

<p id="status">Starting Camera...</p>

<script type="module">

import {
  db,
  doc,
  getDoc,
  updateDoc
} from './firebase.js';

const status =
document.getElementById("status");

let html5QrCode;

let scanning = true;

async function startScanner(){

  try{

    html5QrCode =
    new Html5Qrcode("reader");

    const devices =
    await Html5Qrcode.getCameras();

    if(!devices.length){

      status.innerHTML =
      "❌ No Camera Found";

      status.className =
      "invalid";

      return;

    }

    let cameraId =
    devices[0].id;

    devices.forEach(device => {

      const label =
      device.label.toLowerCase();

      if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ){

        cameraId =
        device.id;

      }

    });

    await html5QrCode.start(

      cameraId,

      {
        fps:10,

        qrbox:{
          width:250,
          height:250
        }

      },

      async(decodedText) => {

        if(!scanning) return;

        scanning = false;

        try{

          const url =
          new URL(decodedText);

          const id =
          url.searchParams.get("id");

          if(!id){

            status.innerHTML =
            "❌ Invalid QR";

            status.className =
            "invalid";

            speak("Invalid QR Code");

            resetScanner();

            return;

          }

          const ticketRef =
          doc(db,"tickets",id);

          const snap =
          await getDoc(ticketRef);

          if(snap.exists()){

            const data =
            snap.data();

            if(data.status === "used"){

              status.innerHTML =
              `❌ ALREADY USED <br> Seat : ${data.seat}`;

              status.className =
              "invalid";

              speak(
              `Seat Number ${data.seat}. Already Used`
              );

            }

            else{

              status.innerHTML =
              `✅ VALID TICKET <br> Seat : ${data.seat}`;

              status.className =
              "valid";

              speak(
              `Valid Ticket. Seat Number ${data.seat}`
              );

              await updateDoc(ticketRef,{

                status:"used"

              });

            }

          }

          else{

            status.innerHTML =
            "❌ INVALID TICKET";

            status.className =
            "invalid";

            speak("Invalid Ticket");

          }

        }

        catch(error){

          console.log(error);

          status.innerHTML =
          "❌ QR ERROR";

          status.className =
          "invalid";

          speak("Error");

        }

        resetScanner();

      }

    );

    status.innerHTML =
    "📷 Camera Ready";

  }

  catch(error){

    console.log(error);

    status.innerHTML =
    "❌ Camera Error";

    status.className =
    "invalid";

  }

}

function resetScanner(){

  setTimeout(() => {

    scanning = true;

  }, 3000);

}

function speak(text){

  window.speechSynthesis.cancel();

  const speech =
  new SpeechSynthesisUtterance();

  speech.text = text;

  speech.lang = "en-US";

  speech.rate = 1;

  window.speechSynthesis.speak(speech);

}

startScanner();

</script>

</body>

</html>
