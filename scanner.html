```html
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body{
      margin:0;
      padding:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    #reader{
      width:320px;
      margin:auto;
      margin-top:30px;
      border:4px solid white;
      border-radius:20px;
      overflow:hidden;
    }

    #status{
      margin-top:20px;
      font-size:22px;
    }

  </style>

</head>

<body>

<h1>📷 Scan Ticket</h1>

<div id="reader"></div>

<p id="status">Starting Camera...</p>

<script type="module">

import {
  db,
  doc,
  getDoc,
  updateDoc
} from './firebase.js';

let html5QrCode;

async function startScanner(){

  try{

    html5QrCode =
    new Html5Qrcode("reader");

    const devices =
    await Html5Qrcode.getCameras();

    if(!devices.length){

      document.getElementById("status")
      .innerHTML = "❌ No Camera Found";

      return;

    }

    let cameraId = devices[0].id;

    devices.forEach(device => {

      const label =
      device.label.toLowerCase();

      if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ){

        cameraId = device.id;

      }

    });

    await html5QrCode.start(

      cameraId,

      {
        fps:10,
        qrbox:{
          width:250,
          height:250
        }
      },

      async(decodedText) => {

        try{

          const url =
          new URL(decodedText);

          const id =
          url.searchParams.get("id");

          if(!id){

            speak("Invalid QR Code");

            document.getElementById("status")
            .innerHTML =
            "❌ Invalid QR";

            return;

          }

          const ticketRef =
          doc(db,"tickets",id);

          const snap =
          await getDoc(ticketRef);

          if(snap.exists()){

            const data =
            snap.data();

            if(data.status === "used"){

              document.getElementById("status")
              .innerHTML =
              "❌ ALREADY USED";

              speak(
              `Seat Number ${data.seat}. Already Used`
              );

            }

            else{

              document.getElementById("status")
              .innerHTML =
              `✅ VALID - Seat ${data.seat}`;

              speak(
              `Valid Ticket. Seat Number ${data.seat}`
              );

              await updateDoc(ticketRef,{

                status:"used"

              });

            }

          }

          else{

            document.getElementById("status")
            .innerHTML =
            "❌ INVALID TICKET";

            speak("Invalid Ticket");

          }

        }

        catch(err){

          console.log(err);

          speak("Error");

        }

      }

    );

    document.getElementById("status")
    .innerHTML =
    "📷 Camera Ready";

  }

  catch(err){

    console.log(err);

    document.getElementById("status")
    .innerHTML =
    "❌ Camera Error";

  }

}

function speak(text){

  const speech =
  new SpeechSynthesisUtterance();

  speech.text = text;

  speech.lang = "en-US";

  speech.rate = 1;

  window.speechSynthesis.speak(speech);

}

startScanner();

</script>

</body>

</html>
