```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QR Ticket Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body{
      margin:0;
      padding:0;
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      text-align:center;
    }

    h1{
      margin-top:20px;
      font-size:32px;
    }

    #reader{
      width:320px;
      margin:auto;
      margin-top:30px;
      border:4px solid white;
      border-radius:20px;
      overflow:hidden;
    }

    #status{
      margin-top:20px;
      font-size:20px;
      color:lime;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      font-size:18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

  </style>

</head>

<body>

<h1>📷 Scan Movie Ticket</h1>

<div id="reader"></div>

<p id="status">Starting camera...</p>

<button onclick="startScanner()">
Restart Scanner
</button>

<script>

let html5QrCode;

async function startScanner(){

  document.getElementById("status").innerHTML =
  "Starting camera...";

  try{

    if(html5QrCode){
      await html5QrCode.stop();
    }

    html5QrCode =
    new Html5Qrcode("reader");

    const devices =
    await Html5Qrcode.getCameras();

    if(!devices || devices.length === 0){

      document.getElementById("status").innerHTML =
      "❌ No Camera Found";

      return;

    }

    let cameraId = devices[0].id;

    for(let i = 0; i < devices.length; i++){

      const label =
      devices[i].label.toLowerCase();

      if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ){

        cameraId = devices[i].id;
        break;

      }

    }

    await html5QrCode.start(

      cameraId,

      {
        fps:10,
        qrbox:{
          width:250,
          height:250
        }
      },

      (decodedText) => {

        document.getElementById("status").innerHTML =
        "✅ QR Detected";

        window.location.href = decodedText;

      },

      (errorMessage) => {

      }

    );

    document.getElementById("status").innerHTML =
    "📷 Camera Ready";

  }

  catch(err){

    console.log(err);

    document.getElementById("status").innerHTML =
    "❌ Camera Error";

    alert(
      "Camera Error: " + err
    );

  }

}

startScanner();

</script>

</body>

</html>
```
