<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Admin QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body{
      margin:0;
      padding:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:20px;
      color:#00ff99;
      text-shadow:0 0 10px #00ff99;
    }

    #reader{
      width:320px;
      margin:auto;
      margin-top:30px;
      border:4px solid white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 0 20px #00ff99;
    }

    #status{
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
    }

    .footer{
      margin-top:40px;
      color:#00ff99;
      font-size:15px;
      font-weight:bold;
      text-shadow:0 0 10px #00ff99;
    }

  </style>

</head>

<body>

<h1>🎬 ADMIN SCANNER</h1>

<div id="reader"></div>

<p id="status">Starting Camera...</p>

<p class="footer">
⚡ Created By Anusara Amaranath ⚡
</p>

<script type="module">

/* 🔐 PASSWORD PROTECTION */

const password =
prompt("Enter Admin Password");

if(password !== "cinema123"){

  document.body.innerHTML =

  "<h1 style='color:red;margin-top:50px;'>❌ Access Denied</h1>";

  throw new Error("Unauthorized");

}

/* 🔥 FIREBASE */

import {

  db,
  doc,
  getDoc,
  updateDoc

} from './firebase.js';

/* 🔥 VARIABLES */

let html5QrCode;

let scanned = false;

/* 🔥 START SCANNER */

async function startScanner(){

  try{

    html5QrCode =
    new Html5Qrcode("reader");

    const devices =
    await Html5Qrcode.getCameras();

    if(!devices.length){

      document.getElementById("status")
      .innerHTML =
      "❌ No Camera Found";

      return;

    }

    /* 📷 BACK CAMERA */

    let cameraId =
    devices[devices.length - 1].id;

    devices.forEach(device => {

      const label =
      device.label.toLowerCase();

      if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ){

        cameraId = device.id;

      }

    });

    await html5QrCode.start(

      cameraId,

      {

        fps:10,

        qrbox:{
          width:250,
          height:250
        }

      },

      async(decodedText) => {

        /* 🛑 STOP DUPLICATE SCAN */

        if(scanned) return;

        scanned = true;

        try{

          const url =
          new URL(decodedText);

          const id =
          url.searchParams.get("id");

          /* ❌ INVALID QR */

          if(!id){

            document.getElementById("status")
            .innerHTML =
            "❌ INVALID QR";

            speak("Invalid QR Code");

            scanned = false;

            return;

          }

          const ticketRef =
          doc(db,"tickets",id);

          const snap =
          await getDoc(ticketRef);

          /* ✅ TICKET EXISTS */

          if(snap.exists()){

            const data =
            snap.data();

            /* ❌ USED */

            if(data.status === "used"){

              document.getElementById("status")
              .innerHTML =
              "❌ ALREADY USED";

              speak(

              `Seat Number ${data.seat}. Already Used`

              );

            }

            /* ✅ VALID */

            else{

              document.getElementById("status")
              .innerHTML =

              `✅ VALID - Seat ${data.seat}`;

              speak(

              `Valid Ticket. Seat Number ${data.seat}`

              );

              /* 🔥 MARK USED */

              await updateDoc(ticketRef,{

                status:"used"

              });

            }

          }

          /* ❌ INVALID */

          else{

            document.getElementById("status")
            .innerHTML =
            "❌ INVALID TICKET";

            speak("Invalid Ticket");

          }

          /* 🔄 RESET */

          setTimeout(() => {

            scanned = false;

            document.getElementById("status")
            .innerHTML =
            "📷 Ready To Scan";

          },3000);

        }

        catch(err){

          console.log(err);

          scanned = false;

          speak("Error");

        }

      }

    );

    document.getElementById("status")
    .innerHTML =
    "📷 Camera Ready";

  }

  catch(err){

    console.log(err);

    document.getElementById("status")
    .innerHTML =
    "❌ Camera Error";

  }

}

/* 🔊 VOICE */

function speak(text){

  const speech =
  new SpeechSynthesisUtterance();

  speech.text = text;

  speech.lang = "en-US";

  speech.rate = 1;

  window.speechSynthesis.speak(speech);

}

/* 🚀 RUN */

startScanner();

</script>

</body>

</html>
